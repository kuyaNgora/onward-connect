<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#0bf4c8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0bf4c8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurNeon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1f2937" stroke-width="1" stroke-opacity="0.6"/>
      <circle cx="60" cy="60" r="1.5" fill="#374151" />
    </pattern>
  </defs>
  
  <!-- Base background (Deep Dark Blue/Black) -->
  <rect width="1920" height="1080" fill="#060913" />
  
  <!-- Tech Grid Background -->
  <rect width="1920" height="1080" fill="url(#grid)" />
  
  <!-- Ambient Glowing Orbs -->
  <rect width="1920" height="1080" fill="url(#glow1)" />
  <rect width="1920" height="1080" fill="url(#glow2)" />

  <!-- Abstract Network and Route Lines -->
  <g stroke="url(#lineGrad)" stroke-width="2" fill="none" filter="url(#blurNeon)">
    <!-- Primary logistics routes -->
    <path d="M-100 200 C 300 100, 500 500, 800 300 S 1400 100, 1600 400 S 2000 800, 2100 600" />
    <path d="M-50 800 C 400 900, 700 400, 1000 600 S 1600 700, 1800 900 S 2000 1000, 2100 900" stroke-opacity="0.7"/>
    
    <!-- Connecting branches -->
    <path d="M800 300 L 1000 600" stroke-width="1" stroke-dasharray="8,8" opacity="0.6" />
    <path d="M1600 400 L 1800 900" stroke-width="1" stroke-dasharray="12,6" opacity="0.5" />
    <path d="M500 700 L 500 500" stroke-width="1" opacity="0.3" />
    <path d="M300 220 L 700 800" stroke-width="1" opacity="0.2" />
  </g>

  <!-- Network Map Nodes (Hubs, Depots, Cities) -->
  <g fill="#0bf4c8" filter="url(#blurNeon)">
    <!-- Hub A -->
    <circle cx="800" cy="300" r="8" />
    <circle cx="800" cy="300" r="20" fill="none" stroke="#0bf4c8" stroke-width="1" />
    <circle cx="800" cy="300" r="35" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,6" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="0 800 300" to="360 800 300" dur="20s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Hub B -->
    <circle cx="1600" cy="400" r="6" />
    <circle cx="1600" cy="400" r="16" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.8"/>
    
    <!-- Hub C -->
    <circle cx="1000" cy="600" r="9" />
    <circle cx="1000" cy="600" r="28" fill="none" stroke="#0bf4c8" stroke-width="0.5" />
    <circle cx="1000" cy="600" r="45" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="2,8" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="360 1000 600" to="0 1000 600" dur="30s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Hub D -->
    <circle cx="1800" cy="900" r="5" />
    <circle cx="1800" cy="900" r="12" fill="none" stroke="#0bf4c8" stroke-width="1" stroke-dasharray="2,4"/>
    
    <!-- Minor Waypoints -->
    <circle cx="300" cy="220" r="4" />
    <circle cx="500" cy="500" r="3" />
    <circle cx="700" cy="800" r="4" />
    <circle cx="1400" cy="180" r="3" />
    <circle cx="2000" cy="800" r="4" />
  </g>

  <!-- Glowing Geographic / UI Accents -->
  <g stroke="#14b8a6" stroke-width="1" fill="none" opacity="0.3">
    <!-- Concentric circles imitating radar or map pings -->
    <circle cx="300" cy="220" r="50" />
    <circle cx="300" cy="220" r="90" />
    <path d="M 300 130 L 300 110 M 300 310 L 300 330 M 210 220 L 190 220 M 390 220 L 410 220" />
    
    <circle cx="2000" cy="800" r="70" />
    <circle cx="2000" cy="800" r="120" stroke-dasharray="10, 10" />
  </g>

  <!-- Floating Ambient Particles -->
  <g fill="#14b8a6">
    <!-- Top Left Cluster -->
    <circle cx="200" cy="150" r="2" opacity="0.8"/>
    <circle cx="240" cy="180" r="1.5" opacity="0.5"/>
    <circle cx="180" cy="280" r="1.5" opacity="0.4"/>
    
    <!-- Center Top Cluster -->
    <circle cx="900" cy="150" r="2" opacity="0.6"/>
    <circle cx="950" cy="200" r="1" opacity="0.8"/>
    
    <!-- Right Cluster -->
    <circle cx="1700" cy="250" r="1.5" opacity="0.5"/>
    <circle cx="1750" cy="300" r="2.5" opacity="0.7"/>
    <circle cx="1800" cy="200" r="1" opacity="0.3"/>
    
    <!-- Bottom Cluster -->
    <circle cx="600" cy="900" r="2" opacity="0.7"/>
    <circle cx="650" cy="850" r="1.5" opacity="0.5"/>
    <circle cx="1200" cy="850" r="2.5" opacity="0.8"/>
    <circle cx="1250" cy="950" r="1.5" opacity="0.4"/>
  </g>

  <!-- Animated Data Streams representing real-time traffic -->
  <!-- Stream 1 -->
  <path d="M-100 200 C 300 100, 500 500, 800 300" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="10, 150" stroke-linecap="round" filter="url(#blurNeon)" opacity="0.9">
    <animate attributeName="stroke-dashoffset" from="160" to="0" dur="2.5s" repeatCount="indefinite" />
  </path>
  <!-- Stream 2 -->
  <path d="M800 300 S 1400 100, 1600 400" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="8, 200" stroke-linecap="round" filter="url(#blurNeon)" opacity="0.8">
    <animate attributeName="stroke-dashoffset" from="208" to="0" dur="3s" repeatCount="indefinite" />
  </path>
  <!-- Stream 3 -->
  <path d="M-50 800 C 400 900, 700 400, 1000 600" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="15, 250" stroke-linecap="round" filter="url(#blurNeon)" opacity="0.9">
    <animate attributeName="stroke-dashoffset" from="265" to="0" dur="4s" repeatCount="indefinite" />
  </path>
  <!-- Stream 4 (Vertical branch) -->
  <path d="M800 300 L 1000 600" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="10, 100" stroke-linecap="round" filter="url(#blurNeon)" opacity="0.7">
    <animate attributeName="stroke-dashoffset" from="110" to="0" dur="1.5s" repeatCount="indefinite" />
  </path>
</svg>
